accounts:
  - name: account_a
    host: login.example.edu
    port: 22
    username: account_a
    private_key_path: "secrets/cluster/account_a.pem"
    remote_workspace: "slurm_scheduler"
    max_running_jobs: 10
    max_pending_jobs: 10
    max_total_jobs: 10
    storage_path: "slurm_scheduler"
    storage_quota_gb: 0
    partition_allowlist: []
    capabilities: ["conda:pyaedt2026v1"]
    env_profiles:
      pyaedt2026v1: |
        source ~/miniconda3/etc/profile.d/conda.sh
        conda activate pyaedt2026v1
  - name: account_b
    host: login.example.edu
    port: 22
    username: account_b
    private_key_path: "secrets/cluster/account_b.pem"
    remote_workspace: "slurm_scheduler"
    max_running_jobs: 10
    max_pending_jobs: 10
    max_total_jobs: 10
    storage_path: "slurm_scheduler"
    storage_quota_gb: 0
    partition_allowlist: []
    capabilities: []
    env_profiles: {}
