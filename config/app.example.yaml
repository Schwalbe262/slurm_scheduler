database_path: "data/slurm_scheduler.db"
accounts_path: "config/accounts.yaml"
poll_interval_seconds: 30
bind_host: "127.0.0.1"
bind_port: 8000
web_remote_file_default_max_bytes: 262144
web_remote_file_hard_max_bytes: 1048576
web_remote_command_timeout_seconds: 5
web_remote_read_concurrency: 2
web_remote_read_cache_seconds: 3
web_timeout_keep_alive_seconds: 5
web_timeout_graceful_shutdown_seconds: 15
web_limit_concurrency: 64
web_listener_watchdog_enabled: true
web_listener_probe_interval_seconds: 5
web_listener_startup_grace_seconds: 30
web_listener_failure_threshold: 3
web_listener_probe_timeout_seconds: 2
web_listener_restart_delay_seconds: 5
cluster_refresh_interval_seconds: 120
min_warm_allocations: 1
allocation_partition: "auto"
allocation_cpus: 64
allocation_memory: "0"
allocation_time_limit: "48:00:00"
allocation_scale_out_usage_threshold: 0.50
allocation_scale_in_idle_seconds: 600
allocation_drain_after_seconds: 129600
allocation_attach_stop_before_drain_seconds: 1800
allocation_force_cancel_after_seconds: 140400
allocation_pending_timeout_seconds: 1800
allocation_pending_backoff_seconds: 1800
allocation_reserved_job_slots: 0
allocation_max_new_per_loop: 8
cpu_pool_allow_gpu_partitions: true
warm_pool_preferred_accounts: ["account_a"]
gpu_warm_pool_preferred_accounts: ["account_a"]
single_job_per_node_partitions: ["cpu2"]
cpu_partition_allocation_limits:
  cpu2: 2
gpu_cpu_reserve: 4
gpu_prewarm:
  enabled: true
  preferred_models: ["a6000"]
  min_warm_allocations: 2
  max_warm_allocations: 4
  gpus_per_allocation: 4
  min_gpus_per_allocation: 4
  cpus_per_allocation: 4
  cpu_reserve_per_free_gpu: 8
  stagger_seconds: 86400
  memory: "128G"
  partition: "auto"
  time_limit: "48:00:00"
  pinned_pending_timeout_seconds: 300
fea_bursty:
  soft_memory_free_percent: 60
  hard_memory_free_percent: 40
  load_target: 0.75
  max_attach_per_loop: 24
  max_attach_per_node_per_loop: 12
  node_name_policy: "preferred"
  # Fast-fill the allocation-owned physical-core baseline (bounded by
  # max_attach_per_node_per_loop), then add overcommit workers at +2/tick;
  # never exceed 2x that baseline.
  node_requested_cpu_factor: 2.0
  # memory_mb remains the per-task peak/safety value. Shared FEA admission
  # reserves this conservative growth estimate while live pestat Freemem is
  # the authoritative node-level guard.
  shared_memory_estimate_fraction: 0.25
  shared_memory_min_estimate_mb: 8192
  overload_scale_out_load_factor: 2.0
  overload_scale_out_seconds: 300
  # Three-stage MFT runs can reach their late Thermal memory peak after
  # roughly 48-53 minutes. Keep shared RAM growth reserved for the first hour.
  footprint_maturity_seconds: 3600
  # CPU declarations need only bridge the delay until load/sstat observes a
  # newly attached worker; do not double-count CPU for the full RAM window.
  cpu_footprint_maturity_seconds: 120
license_monitor:
  enabled: false
  account: "account_a"
  lmutil_path: "/path/to/lmutil"
  license_server: "1055@license-server"
  interval_seconds: 60
  admission:
    enabled: false
    snapshot_max_age_seconds: 120
    settlement_seconds: 300
    reserve_by_feature:
      electronics_desktop: 32
    persistent_cost_by_project:
      # Required for license-gated AEDT pool demand and warm-spare hosts.
      _aedt_pool_hosts:
        electronics_desktop: 1
      MFT_1MW_2026v1:
        electronics_desktop: 1
      PYAEDT_MOTOR_IPMSM_V2:
        electronics_desktop: 1
    unknown_fea_project_policy: block
# Experimental and disabled until the live 1-AEDT:2-project A/B gate passes.
aedt_pool:
  session_host_enabled: false
  scheduler_url: ""
  host_remote_cwd: ""
  host_python: "python"
  host_env_setup: ""
  host_bootstrap_token_file: ""
  host_task_memory_mb: 4096
cleanup:
  enabled: true
  interval_seconds: 3600
  finished_task_ttl_seconds: 259200
  finished_job_ttl_seconds: 259200
  closed_allocation_ttl_seconds: 86400
git_credentials:
  - id: private-project
    url_patterns:
      - "git@github.com:org/private-project.git"
      - "https://github.com/org/private-project.git"
      - "*org/private-project*"
    clone_url: "git@github.com:org/private-project.git"
    source_account: "account_a"
    source_private_key_path: "~/.ssh/private_project_deploy"
    strict_host_key_checking: "accept-new"
