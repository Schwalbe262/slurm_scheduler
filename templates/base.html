<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slurm Scheduler</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d7dce2;
      --text: #1f2933;
      --muted: #657181;
      --accent: #1d6fb8;
      --danger: #b42318;
      --soft: #eef1f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14181d;
        --panel: #1d232b;
        --line: #333c47;
        --text: #e4e9ee;
        --muted: #94a1b0;
        --accent: #5aa2e0;
        --danger: #f08578;
        --soft: #262e38;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header a { color: var(--text); font-weight: 700; text-decoration: none; }
    main { padding: 24px; max-width: 1440px; margin: 0 auto; }
    h1, h2 { margin: 0 0 14px; }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; }
    .stack { display: grid; gap: 20px; }
    .stack > *, .forms-grid > *, .form-grid > *, .two-column-grid > * { min-width: 0; }
    .forms-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(360px, 1.15fr) minmax(320px, 0.85fr);
      align-items: start;
    }
    .submit-panel { grid-column: 1 / -1; }
    .form-grid {
      display: grid;
      gap: 0 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .form-grid .full { grid-column: 1 / -1; }
    .two-column-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      min-width: 0;
    }
    label { display: block; font-weight: 600; margin: 12px 0 5px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: var(--panel);
      min-width: 0;
    }
    textarea { min-height: 78px; resize: vertical; }
    .compact-input { width: 86px; max-width: 100%; }
    button, .button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    button.secondary { background: var(--panel); color: var(--accent); }
    button.danger { background: var(--danger); border-color: var(--danger); }
    button.compact { padding: 4px 8px; font-size: 12px; }
    .inline-form { display: inline; margin: 0; }
    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--panel);
    }
    button.mode-tab {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: var(--panel);
      color: var(--text);
      white-space: normal;
    }
    button.mode-tab:last-child { border-right: 0; }
    button.mode-tab[aria-selected="true"] {
      background: var(--accent);
      color: #fff;
    }
    .mode-panel[hidden] { display: none; }
    .label-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0 5px;
    }
    .label-row label { margin: 0; }
    button.help-dot {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 1px solid var(--line);
      border-radius: 50%;
      padding: 0;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      font-weight: 750;
      cursor: help;
      overflow: visible;
    }
    button.help-dot::after {
      content: attr(data-help);
      position: absolute;
      z-index: 20;
      left: 50%;
      bottom: calc(100% + 8px);
      width: min(280px, 70vw);
      transform: translateX(-50%);
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111827;
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 500;
      text-align: left;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
    }
    button.help-dot:hover::after,
    button.help-dot:focus-visible::after {
      opacity: 1;
    }
    .form-actions { margin: 14px 0 0; }
    .section-gap { margin-top: 20px; }
    .table-scroll {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .table-scroll table { min-width: 720px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); }
    .table-scroll table { border: 0; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: left; vertical-align: top; }
    tr:last-child th, tr:last-child td { border-bottom: 0; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0; }
    code { background: var(--soft); border-radius: 4px; padding: 2px 4px; }
    .mono-cell, code {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .mono-cell {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      max-width: 360px;
    }
    tr.warm-pool-row td {
      background: #fff7e6;
    }
    tr.warm-pool-row td:first-child {
      border-left: 3px solid #c77700;
    }
    .warm-pool-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 5px;
      border: 1px solid #e0aa50;
      border-radius: 999px;
      background: #fff3d8;
      color: #6f4400;
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark) {
      tr.warm-pool-row td { background: #38301d; }
      tr.warm-pool-row td:first-child { border-left-color: #e0aa50; }
      .warm-pool-tag { background: #4a3a1a; color: #e8c27a; border-color: #8a6a2a; }
      button.help-dot::after { background: #0b0f14; }
    }
    .pool-time-cell {
      white-space: nowrap;
    }
    .pool-time-label {
      display: inline-block;
      min-width: 32px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
    }
    .status-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .muted { color: var(--muted); }
    .error { color: var(--danger); }
    details summary {
      cursor: pointer;
      color: var(--text);
      font-weight: 650;
    }
    details[open] summary { margin-bottom: 10px; }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .table-controls {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(220px, 2fr) repeat(2, minmax(130px, 1fr)) auto;
      align-items: end;
      margin: 0 0 12px;
    }
    .table-controls label {
      margin-top: 0;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .table-controls .actions { justify-content: flex-end; }
    .summary-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      flex-wrap: wrap;
      margin: 0 0 12px;
    }
    .summary-item {
      display: grid;
      gap: 2px;
      min-width: 138px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
    }
    .summary-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .summary-value {
      font-size: 16px;
      font-weight: 750;
      line-height: 1.2;
    }
    svg { width: 100%; height: 220px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    svg line { stroke: #9aa5b1; stroke-width: 1; }
    svg polyline { fill: none; stroke: var(--accent); stroke-width: 2; }
    svg circle { fill: var(--accent); }
    @media (max-width: 980px) {
      .forms-grid, .two-column-grid, .form-grid { grid-template-columns: 1fr; }
      .table-controls { grid-template-columns: 1fr; }
      .table-controls .actions { justify-content: flex-start; }
      main { padding: 14px; }
      .panel { padding: 14px; }
      button, .button { white-space: normal; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">Slurm Scheduler</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
